<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Inventory</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light">
    <div id="app">
        <nav>
            <div class="logo">
                <div class="logo-dot"></div>
                <span>Stellar</span>
            </div>
            <div class="actions">
                <button id="theme-toggle" class="btn-icon">
                    <svg class="sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </nav>

        <main>
            <header>
                <div class="header-content">
                    <h1>Product Ecosystem</h1>
                    <p>Manage and orchestrate your inventory infrastructure.</p>
                </div>
                <button id="add-btn" class="btn-primary">
                    <span>Add Resource</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </header>

            <div class="metrics">
                <div class="metric-card">
                    <span class="label">Total Products</span>
                    <span id="total-count" class="value">0</span>
                </div>
                <div class="metric-card">
                    <span class="label">Net Equity</span>
                    <span id="total-value" class="value">$0.00</span>
                </div>
            </div>

            <div class="data-grid">
                <table id="product-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">REF.</th>
                            <th>Identity</th>
                            <th>Market Value</th>
                            <th style="width: 100px; text-align: right;">Operations</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div id="loader" class="hidden">Scanning network...</div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Update -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h2 id="modal-title">New Entry</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="field">
                    <label>Resource Name</label>
                    <input type="text" id="name" placeholder="e.g. Hypernode Core" required>
                </div>
                <div class="field">
                    <label>Unit Valuation ($)</label>
                    <input type="number" id="price" step="0.01" placeholder="0.00" required>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="btn-secondary">Dismiss</button>
                    <button type="submit" class="btn-primary">Commit Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
